name: ✨ 功能建议 / Feature Request
description: 提一个新功能或改进建议 / Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 你在什么场景下遇到了什么痛点？ / What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案 / Proposal
    validations:
      required: false
