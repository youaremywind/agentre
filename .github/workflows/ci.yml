name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop/*

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - run: make test-backend

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Lint
        run: cd frontend && pnpm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Generate Wails bindings
        run: wails generate module
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Test
        run: cd frontend && pnpm run test

  e2e:
    name: E2E
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          # node:sqlite (e2e DB oracle) is stable/unflagged on Node 24.
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            e2e/pnpm-lock.yaml

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install e2e dependencies
        run: cd e2e && pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: xvfb-run -a make e2e

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          if-no-files-found: ignore
          path: |
            /tmp/agentre-e2e-webserver.log
            e2e/playwright-report/
            e2e/test-results/
